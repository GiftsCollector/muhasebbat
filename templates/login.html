{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center fade-up">
  <div class="col-lg-5 col-md-8">
    <div class="glass-card p-4 shadow-sm">
      <h3 class="section-title mb-3">تسجيل الدخول</h3>
      <p class="text-muted mb-4">ادخل بيانات حسابك للوصول إلى النظام.</p>
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label">اسم المستخدم</label>
          <input class="form-control" name="username" required autocomplete="username">
        </div>
        <div class="col-12">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-control" name="password" required autocomplete="current-password">
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-cyan btn-lg">دخول</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
